version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: frotas-db
    restart: unless-stopped
    command: [
      "--default-authentication-plugin=mysql_native_password",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]
    environment:
      MYSQL_DATABASE: ${DB_NAME:-frotas}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: frotas-app
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # Sobrescreve host/porta para uso no Compose
      DB_HOST: db
      DB_PORT: 3306
      DJANGO_ALLOWED_HOSTS: 0.0.0.0,localhost
    ports:
      - "8000:8000"
    # descomente para desenvolvimento quente (opcional)
    # volumes:
    #   - .:/app

volumes:
  db_data:
