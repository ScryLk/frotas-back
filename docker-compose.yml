services:
  db:
    image: mysql:8.0
    container_name: frotas-db
    restart: unless-stopped
    command: [
      "--default-authentication-plugin=mysql_native_password",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]
    environment:
      MYSQL_DATABASE: ${DB_NAME:-frotas}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: frotas-app
    depends_on:
      - db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Sobrescreve host/porta para uso no Compose
      DB_HOST: db
      DB_PORT: 3306
      # Use the value from .env if present, otherwise include frotas.pbi.local by default
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-0.0.0.0,localhost,frotas.pbi.local}
      # Gunicorn tuning
      WEB_CONCURRENCY: 4
      GUNICORN_WORKER_CLASS: gthread
      GUNICORN_THREADS: 4
      GUNICORN_KEEP_ALIVE: 10
      GUNICORN_GRACEFUL_TIMEOUT: 30
      GUNICORN_MAX_REQUESTS: 1000
      GUNICORN_MAX_REQUESTS_JITTER: 100
      GUNICORN_PRELOAD: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport sys, urllib.request\ntry:\n    urllib.request.urlopen('http://localhost:8000/api/health/', timeout=2)\n    sys.exit(0)\nexcept Exception:\n    sys.exit(1)\nPY"]
      interval: 15s
      timeout: 5s
      retries: 5
    # descomente para desenvolvimento quente (opcional)
    # volumes:
    #   - .:/app

volumes:
  db_data:
