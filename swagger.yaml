components:
  schemas:
    Carro:
      type: object
      properties:
        placa:
          type: string
          maxLength: 10
        modelo:
          type: string
          maxLength: 120
        secretaria:
          type: string
          format: uuid
        ano:
          type: integer
          maximum: 4294967295
          minimum: 0
          format: int64
          nullable: true
        ativo:
          type: boolean
        odometro_atual:
          type: integer
          readOnly: true
        criado_em:
          type: string
          format: date-time
          readOnly: true
        atualizado_em:
          type: string
          format: date-time
          readOnly: true
      required:
      - atualizado_em
      - criado_em
      - modelo
      - placa
      - secretaria
    CarroListResponse:
      type: object
      properties:
        status:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Carro'
      required:
      - data
      - status
    CarroResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: '#/components/schemas/Carro'
      required:
      - data
      - status
    CustomTokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    CustomTokenRefresh:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    EmptySuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          nullable: true
          type: string
          example: null
      required:
      - status
      - data
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Dados inválidos
        errors:
          type: object
          nullable: true
      required:
      - status
      - message
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    MeResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: '#/components/schemas/UserPublic'
      required:
      - data
      - status
    PatchedCarro:
      type: object
      properties:
        placa:
          type: string
          maxLength: 10
        modelo:
          type: string
          maxLength: 120
        secretaria:
          type: string
          format: uuid
        ano:
          type: integer
          maximum: 4294967295
          minimum: 0
          format: int64
          nullable: true
        ativo:
          type: boolean
        criado_em:
          type: string
          format: date-time
          readOnly: true
        atualizado_em:
          type: string
          format: date-time
          readOnly: true
    PatchedSecretaria:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        nome:
          type: string
          maxLength: 120
        responsavel:
          type: string
